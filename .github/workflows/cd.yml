name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [test, staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: test
    steps:
      - name: Deploy to Test
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "docker run -d -p 5001:5000 -e ENVIRONMENT=test ..."

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: staging
    steps:
      - name: Deploy to Staging
        run: |
          echo "Promoting to Staging"
          echo "docker run -d -p 5002:5000 -e ENVIRONMENT=staging ..."

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Deploy to Production
        run: |
          echo "Promoting to Production"
          echo "docker run -d -p 5000:5000 -e ENVIRONMENT=production ..."
